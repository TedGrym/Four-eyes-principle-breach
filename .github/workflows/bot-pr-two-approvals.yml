# .github/workflows/bot-pr-two-approvals.yml
#
# Vynucuje 2 lidská schválení u PR, jejichž autorem je bot.
# Schvalovatel se nepočítá, pokud je autorem/committerem jakéhokoli commitu v PR,
# nebo pokud nemá write/admin přístup k repu (ochrana proti sockpuppet účtům
# na veřejném repu – review může odeslat kdokoli).
# Bot PR s commitem bez ověřeného podpisu je rovnou failure: nepodepsaný commit
# může mít podvržený author e-mail a obejít tak detekci committerů.
# Výsledek publikuje jako commit status "bot-pr/two-human-approvals",
# který je v branch protection nastaven jako REQUIRED.
#
# Bezpečnostní poznámky:
# - pull_request_target => workflow běží z base větve, útočník ho nemůže
#   změnit v rámci útočného PR.
# - NIKDY zde nedělat checkout PR kódu (actions/checkout s PR ref) ani
#   spouštět nic z PR. Používáme výhradně GitHub API.
# - Soubor chránit přes CODEOWNERS (.github/** -> security tým) a v branch
#   protection zapnout "Require review from Code Owners". Trigger
#   pull_request_review totiž (na rozdíl od pull_request_target) spouští
#   verzi workflow z merge commitu PR, takže neschválená změna tohoto
#   souboru by mohla podvrhnout výsledný status.
# - Bot PRy z forků nepodporujeme: run na pull_request_review by u nich měl
#   read-only token a zápis statusu by selhal. Dependabot i GitHub Apps
#   pushují do větví v tomto repu, takže to nevadí.

name: bot-pr-two-approvals

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read
  statuses: write

concurrency:
  group: bot-approvals-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: python3 -m pip install --quiet requests

      - name: Evaluate approvals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import json
          import os
          import sys

          import requests

          REQUIRED_HUMAN_APPROVALS = 2
          STATUS_CONTEXT = "bot-pr/two-human-approvals"

          # Machine-user účty (běžné uživatelské účty používané jako boti,
          # např. CI účet s PAT), které mají podléhat stejným pravidlům
          # jako GitHub Apps. Loginy uvádět malými písmeny.
          MACHINE_USER_BOTS = {
              # "ci-bot-example",
          }

          API = os.environ["GITHUB_API_URL"]
          REPO = os.environ["GITHUB_REPOSITORY"]

          session = requests.Session()
          session.headers.update({
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Accept": "application/vnd.github+json",
          })

          def get_all_pages(path):
              """Stáhne všechny položky ze stránkovaného list endpointu."""
              items, page = [], 1
              while True:
                  r = session.get(f"{API}/repos/{REPO}{path}",
                                  params={"per_page": 100, "page": page})
                  r.raise_for_status()
                  batch = r.json()
                  items += batch
                  if len(batch) < 100:
                      return items
                  page += 1

          with open(os.environ["GITHUB_EVENT_PATH"]) as f:
              pr = json.load(f)["pull_request"]

          head_sha = pr["head"]["sha"]

          def set_status(state, description):
              r = session.post(f"{API}/repos/{REPO}/statuses/{head_sha}", json={
                  "state": state,
                  "context": STATUS_CONTEXT,
                  "description": description[:140],
              })
              r.raise_for_status()

          # 1) Je autor PR bot?
          author = pr["user"]
          is_bot = (
              author["type"] == "Bot"
              or author["login"].endswith("[bot]")
              or author["login"].lower() in MACHINE_USER_BOTS
          )

          if not is_bot:
              # Lidská PR řeší nativní branch protection (1 approval).
              set_status("success", "PR není od bota – platí standardní pravidla.")
              sys.exit(0)

          # 2) Kdo do PR přispěl commitem? (author i committer)
          commits = get_all_pages(f"/pulls/{pr['number']}/commits")

          contributors = set()
          for c in commits:
              if (c.get("author") or {}).get("login"):
                  contributors.add(c["author"]["login"].lower())
              # web-flow = GitHub UI merge/edit committer, ignorujeme
              committer_login = (c.get("committer") or {}).get("login")
              if committer_login and committer_login != "web-flow":
                  contributors.add(committer_login.lower())

          # 2b) Všechny commity musí mít ověřený podpis. Nepodepsaný commit
          #     může mít podvržený author e-mail, a tím obejít detekci
          #     committerů (schvalovatel by si schválil vlastní commit).
          unverified = [c for c in commits
                        if not c["commit"].get("verification", {}).get("verified")]
          if unverified:
              set_status(
                  "failure",
                  f"Bot PR: {len(unverified)} commit(ů) bez ověřeného podpisu "
                  "– autory nelze spolehlivě určit.",
              )
              sys.exit(0)

          # 3) Poslední review od každého uživatele
          latest_by_user = {}
          for review in get_all_pages(f"/pulls/{pr['number']}/reviews"):
              user = review.get("user")
              if not user or user["type"] == "Bot":
                  continue
              if review["state"] == "COMMENTED":
                  continue  # komentář nemění stav approvalu
              latest_by_user[user["login"].lower()] = review

          # 4) Platné approvals: stav APPROVED, na aktuálním head SHA,
          #    od někoho, kdo do PR nepřispěl commitem a má write/admin
          #    přístup. Bez kontroly oprávnění by na veřejném repu stačily
          #    dva jednorázové účty – review může odeslat kdokoli.
          #    (Legacy pole `permission` mapuje maintain->write, triage->read,
          #    takže test na admin/write pokrývá i maintain.)
          def has_write_access(username):
              r = session.get(f"{API}/repos/{REPO}/collaborators/{username}/permission")
              if r.status_code != 200:
                  return False  # 404 => není kolaborátor
              return r.json()["permission"] in ("admin", "write")

          valid_approvers = [
              login
              for login, review in latest_by_user.items()
              if review["state"] == "APPROVED"
              and review["commit_id"] == head_sha      # approval starší verze neplatí
              and login not in contributors            # committer si neschvaluje
              and has_write_access(review["user"]["login"])
          ]

          ok = len(valid_approvers) >= REQUIRED_HUMAN_APPROVALS
          print(f"Bot PR #{pr['number']}: valid approvals = {', '.join(valid_approvers) or 'none'}")

          set_status(
              "success" if ok else "pending",
              f"OK: {len(valid_approvers)} nezávislá lidská schválení."
              if ok else
              f"Bot PR: potřeba {REQUIRED_HUMAN_APPROVALS} schválení od "
              f"ne-committerů s write přístupem (má {len(valid_approvers)}).",
          )
